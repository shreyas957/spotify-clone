spring:
  application:
    name: spotify-user-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URL}

  datasource:
    url: jdbc:mysql://localhost:3306/spotify_user_local
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect